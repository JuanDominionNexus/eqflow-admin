<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ccfbf1" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle inner shadow -->
  <rect width="512" height="512" rx="96" fill="none" stroke="#0f766e" stroke-width="4" opacity="0.3"/>
  <!-- Flow/pulse wave — the core symbol -->
  <path
    d="M 80 280
       Q 140 280, 170 220
       Q 200 160, 230 260
       Q 260 360, 290 200
       Q 320 40, 350 260
       Q 370 400, 400 280
       Q 420 200, 432 280"
    fill="none"
    stroke="url(#glow)"
    stroke-width="36"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Small dot at the end — like a live pulse -->
  <circle cx="432" cy="280" r="18" fill="#fff" opacity="0.95"/>
  <circle cx="432" cy="280" r="9" fill="#14b8a6"/>
</svg>
